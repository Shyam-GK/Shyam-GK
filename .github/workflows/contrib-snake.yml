name: "GitHub Contribution Snake"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake
        uses: sallar/github-contribution-canvas@v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          file: output/github-contribution-grid-snake-dark.svg
          username: "Shyam-GK"
          theme: "dark"

      - name: Commit Snake
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "update snake"
          file_pattern: output/github-contribution-grid-snake-dark.svg
